<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مجموعة السعيد التجارية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:26px;
font-weight:900;
color:#FFD700;
}

.cart{
cursor:pointer;
font-size:20px;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:50px;
color:#FFD700;
margin-bottom:10px;
}

.hero p{
color:#ccc;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:50px;
}

.product{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.product:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(255,215,0,0.2);
}

.product img{
width:140px;
height:180px;
object-fit:contain;
margin-bottom:15px;
}

.product h3{
color:#FFD700;
margin-bottom:10px;
}

.product p{
font-size:14px;
color:#aaa;
margin-bottom:10px;
}

.price{
font-size:20px;
margin-bottom:15px;
}

button{
padding:8px 20px;
border:1px solid #FFD700;
background:transparent;
color:#FFD700;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#FFD700;
color:black;
}

/* FOOTER */

.footer{
text-align:center;
padding:30px;
background:rgba(255,255,255,0.05);
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">AL SAEED</div>

<div class="cart">🛒</div>

</div>

<div class="hero">

<h1>مجموعة السعيد التجارية</h1>

<p>عطور – بخور – مسك – مباخر فاخرة</p>

</div>

<div class="products" id="products"></div>

<div class="footer">

© 2026 AL SAEED TRADING GROUP

</div>

<script>

const products=[

{
name:"Vegas Stick Collection",
price:220,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"أعواد بخور فاخرة تحتوي على: عود السديم، روعة المسك، أصيل الطيب، عود جودي، أميرة غرامي، الأرجوان."
},

{
name:"Vegas Cubes",
price:240,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"مكعبات بخور مضغوطة بروائح Vegas Discovery و Vegas Secret و Vegas Code."
},

{
name:"Vegas Bullet Collection",
price:210,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"بخور مركز يحتوي: عود منسية، صقر عماني، سراب، لبان، شيراز، عود السيوف."
},

{
name:"Chocolate Incense",
price:230,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"بخور مبتكر على شكل شوكولاتة بروائح روعة الشرق وعود مذهل."
},

{
name:"Land of the Nile Collection",
price:260,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"مجموعة مستوحاة من المدن المصرية: سيوة، الجيزة، الأقصر، أسوان، الإسكندرية."
},

{
name:"Pharaonic Collection",
price:270,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"بخور فاخر بروائح نفرتيتي وتوت عنخ آمون وكليوباترا."
},

{
name:"Musk Al Aroosa Set",
price:450,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"طقم مسك العروسة يحتوي ثلاث زجاجات مسك مركز 30 مل."
},

{
name:"Body Splash Collection",
price:120,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"معطرات جسم بروائح 212 Sexy و Good Girls و Coco Mademoiselle."
},

{
name:"Backflow Incense Burner",
price:350,
img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png",
desc:"مبخرة حديثة بتقنية التدفق العكسي للدخان."
}

];

const container=document.getElementById("products");

products.forEach(p=>{

container.innerHTML+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>${p.desc}</p>

<div class="price">${p.price} جنيه</div>

<button>أضف للسلة</button>

</div>

`;

});

</script>

</body>

</html>
