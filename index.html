<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مجموعة السعيد التجارية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:26px;
font-weight:900;
color:#FFD700;
}

.nav-links{
display:flex;
gap:25px;
align-items:center;
}

.nav-links a{
text-decoration:none;
color:white;
transition:0.3s;
}

.nav-links a:hover{
color:#FFD700;
}

.cart{
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
left:-10px;
background:red;
border-radius:50%;
font-size:12px;
padding:3px 7px;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:50px;
color:#FFD700;
margin-bottom:15px;
}

.hero p{
color:#ccc;
max-width:600px;
margin-bottom:30px;
}

.hero button{
padding:14px 35px;
border:none;
background:#FFD700;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

/* SEARCH */

.search-box{
text-align:center;
margin:40px;
}

.search-box input{
width:300px;
padding:12px;
border-radius:30px;
border:none;
}

/* FILTER */

.filters{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.filter-btn{
padding:8px 20px;
border:1px solid #FFD700;
background:transparent;
color:#FFD700;
border-radius:20px;
cursor:pointer;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.product{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.product:hover{
transform:translateY(-10px);
}

.product img{
width:100px;
margin-bottom:15px;
}

.product h3{
color:#FFD700;
margin-bottom:10px;
}

.product p{
font-size:14px;
color:#aaa;
margin-bottom:15px;
}

.price{
margin-bottom:15px;
font-size:18px;
}

.product button{
padding:8px 20px;
border:1px solid #FFD700;
background:transparent;
color:#FFD700;
border-radius:20px;
cursor:pointer;
}

/* CART PANEL */

.cart-panel{
position:fixed;
top:0;
left:-400px;
width:350px;
height:100%;
background:#111827;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cart-panel.active{
left:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.cart-total{
margin-top:20px;
font-size:20px;
}

/* FOOTER */

.footer{
text-align:center;
padding:30px;
margin-top:50px;
background:rgba(255,255,255,0.05);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">السعيد</div>

<div class="nav-links">

<a href="#">الرئيسية</a>
<a href="#">المنتجات</a>
<a href="#">تواصل</a>

<div class="cart" onclick="toggleCart()">

🛒

<span class="cart-count" id="cartCount">0</span>

</div>

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>عطور وبخور فاخرة</h1>

<p>اكتشف مجموعة فيجاس والعطور العالمية</p>

<button onclick="scrollToProducts()">تصفح المنتجات</button>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text" id="search" placeholder="ابحث عن عطر..." onkeyup="searchProducts()">

</div>

<!-- FILTER -->

<div class="filters">

<button class="filter-btn" onclick="filter('all')">الكل</button>
<button class="filter-btn" onclick="filter('perfume')">عطور</button>
<button class="filter-btn" onclick="filter('incense')">بخور</button>
<button class="filter-btn" onclick="filter('musk')">مسك</button>

</div>

<!-- PRODUCTS -->

<div class="products" id="products"></div>

<!-- CART -->

<div class="cart-panel" id="cartPanel">

<h2>سلة المشتريات</h2>

<div id="cartItems"></div>

<div class="cart-total">

الإجمالي: <span id="total">0</span> جنيه

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 مجموعة السعيد التجارية

</div>

<script>

const products=[

{ id:1,name:"Bleu de Chanel",price:1250,cat:"perfume"},

{ id:2,name:"Khamrah Lattafa",price:650,cat:"perfume"},

{ id:3,name:"Vegas Stick",price:180,cat:"incense"},

{ id:4,name:"Musk Al Aroosa",price:450,cat:"musk"}

];

let cart=[];

function renderProducts(list){

const container=document.getElementById("products");

container.innerHTML="";

list.forEach(p=>{

container.innerHTML+=`

<div class="product">

<img src="https://cdn-icons-png.flaticon.com/512/2936/2936886.png">

<h3>${p.name}</h3>

<p>منتج فاخر من متجر السعيد</p>

<div class="price">${p.price} جنيه</div>

<button onclick="addToCart(${p.id})">أضف للسلة</button>

</div>

`;

});

}

renderProducts(products);

function filter(cat){

if(cat==="all")renderProducts(products);

else renderProducts(products.filter(p=>p.cat===cat));

}

function searchProducts(){

let val=document.getElementById("search").value.toLowerCase();

renderProducts(products.filter(p=>p.name.toLowerCase().includes(val)));

}

function addToCart(id){

let product=products.find(p=>p.id===id);

cart.push(product);

updateCart();

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

let html="";

let total=0;

cart.forEach(item=>{

total+=item.price;

html+=`<div class="cart-item">

<span>${item.name}</span>

<span>${item.price}</span>

</div>`;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerText=total;

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("active");

}

function scrollToProducts(){

window.scrollTo({top:500,behavior:"smooth"});

}

</script>

</body>

</html>
