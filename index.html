<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>مجموعة السعيد للعطور والبخور</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><style>

body{
margin:0;
font-family:Cairo;
background:#000;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid #222;
}

.logo{
color:#d4af37;
font-weight:900;
font-size:26px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.hero{
height:420px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(#000,#111);
}

.hero h1{
color:#d4af37;
font-size:40px;
}

.section{
padding:60px 40px;
}

.section h2{
text-align:center;
color:#d4af37;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:#0a0a0a;
border:1px solid #222;
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.price{
color:#d4af37;
font-size:20px;
margin:10px 0;
}

.btn{
background:#d4af37;
color:black;
padding:10px 18px;
border-radius:20px;
text-decoration:none;
display:inline-block;
cursor:pointer;
}

.search{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:6px;
}

#viewer3d{
height:400px;
margin-top:40px;
}

.cart{
position:fixed;
left:20px;
bottom:20px;
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #333;
}

footer{
background:#0a0a0a;
text-align:center;
padding:40px;
}

</style></head><body><header><div class="logo">مجموعة السعيد</div><nav><a href="#">الرئيسية</a>
<a href="#products">المنتجات</a>
<a href="#viewer3d">عرض 3D</a>

</nav></header><section class="hero"><h1>عالم العطور والبخور الفاخر</h1></section><section class="section" id="products"><h2>المنتجات</h2><input class="search" placeholder="ابحث عن منتج..." onkeyup="searchProducts(this.value)"><div class="products" id="productsContainer"></div></section><section class="section"><h2>عرض ثلاثي الأبعاد</h2><div id="viewer3d"></div></section><div class="cart">🛒 السلة:
<span id="cartCount">0</span>

</div><footer><p>📞 الهاتف: 01003500353</p>
<p>📱 واتساب: 01055880061</p></footer><script>

let cart = 0

const products=[

{name:"مجموعة أعواد البخور",price:220,img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},

{name:"المجموعة الفرعونية",price:260,img:"https://images.unsplash.com/photo-1594035910387-fea47794261f"},

{name:"مجموعة أرض النيل",price:270,img:"https://images.unsplash.com/photo-1592945403244-b3fbafd7f539"},

{name:"عطر مسك ملكي",price:450,img:"https://images.unsplash.com/photo-1595425970377-c9703cf48b6d"},

{name:"عطر عود عربي",price:520,img:"https://images.unsplash.com/photo-1619994403073-2cec1c5f2d7c"}

]

function render(list){

const container=document.getElementById("productsContainer")

container.innerHTML=""

list.forEach(p=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">${p.price} جنيه</div>

<button class="btn" onclick="addCart()">أضف للسلة</button>

<a class="btn"
href="https://wa.me/201055880061?text=أريد طلب ${p.name}">
واتساب
</a>

</div>

`

})

}

render(products)

function searchProducts(q){

const filtered=products.filter(p=>p.name.includes(q))

render(filtered)

}

function addCart(){

cart++

document.getElementById("cartCount").innerText=cart

}

/* 3D */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,1000)

const renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,400)

document.getElementById("viewer3d").appendChild(renderer.domElement)

const geometry=new THREE.CylinderGeometry(1,1,3,32)

const material=new THREE.MeshStandardMaterial({

color:0xd4af37,

metalness:1,

roughness:0.2

})

const bottle=new THREE.Mesh(geometry,material)

scene.add(bottle)

const light=new THREE.PointLight(0xffffff,1)

light.position.set(5,5,5)

scene.add(light)

camera.position.z=5

function animate(){

requestAnimationFrame(animate)

bottle.rotation.y+=0.01

renderer.render(scene,camera)

}

animate()

</script></body></html>
