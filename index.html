<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مجموعة السعيد للعطور والبخور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#000;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:black;
border-bottom:1px solid #333;
}

.logo{
font-size:28px;
font-weight:900;
color:#D4AF37;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:16px;
}

.hero{
height:500px;
background:url("https://images.unsplash.com/photo-1592945403244-b3fbafd7f539") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:48px;
background:rgba(0,0,0,0.5);
padding:20px 40px;
border:1px solid #D4AF37;
}

.section{
padding:60px;
}

.section h2{
color:#D4AF37;
margin-bottom:40px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.product{
background:#0a0a0a;
padding:20px;
border-radius:10px;
border:1px solid #222;
text-align:center;
transition:.3s;
}

.product:hover{
transform:translateY(-5px);
border-color:#D4AF37;
}

.product img{
width:180px;
height:180px;
object-fit:cover;
margin-bottom:15px;
}

.price{
color:#D4AF37;
font-size:20px;
margin:10px 0;
}

.btn{
background:#D4AF37;
color:black;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
text-decoration:none;
}

.footer{
background:#0a0a0a;
padding:40px;
text-align:center;
border-top:1px solid #222;
}

.social a{
color:#D4AF37;
margin:0 10px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<div class="logo">مجموعة السعيد</div>

<nav>

<a href="#">الرئيسية</a>
<a href="#">العطور</a>
<a href="#">البخور</a>
<a href="#">المسك</a>
<a href="#">تواصل</a>

</nav>

</header>

<section class="hero">

<h1>عالم العطور الشرقية الفاخرة</h1>

</section>

<section class="section">

<h2>أفضل المنتجات</h2>

<div class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">

<h3>بخور فاخر</h3>

<p>رائحة شرقية أصيلة تدوم طويلاً</p>

<div class="price">220 جنيه</div>

<a class="btn" href="https://wa.me/201055880061?text=أريد طلب بخور فاخر">اطلب الآن</a>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">

<h3>مسك ملكي</h3>

<p>مسك مركز فاخر</p>

<div class="price">180 جنيه</div>

<a class="btn" href="https://wa.me/201055880061?text=أريد طلب مسك ملكي">اطلب الآن</a>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">

<h3>عطر شرقي</h3>

<p>مزيج من العود والمسك</p>

<div class="price">320 جنيه</div>

<a class="btn" href="https://wa.me/201055880061?text=أريد طلب عطر شرقي">اطلب الآن</a>

</div>

</div>

</section>

<footer class="footer">

<p>📞 01003500353</p>

<p>📱 واتساب 01055880061</p>

<div class="social">

<a href="https://instagram.com/AL_SAEED_TRADING_GROUP">Instagram</a>

</div>

</footer>

</body>

</html>
